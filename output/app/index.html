 ```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        input[type="text"],
        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: none;
            margin-bottom: 20px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding: 10px;
        }

        input[type="checkbox"] {
            transform: scale(2);
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Todo App</h1>
        <form id="todoForm">
            <input type="text" id="todoInput" placeholder="Ajouter une tâche..." required />
            <button type="submit">Ajouter</button>
        </form>
        <ul id="todos"></ul>
    </div>

    <script>
        const todoForm = document.getElementById('todoForm');
        const todoInput = document.getElementById('todoInput');
        const todosList = document.getElementById('todos');

        let todos = [];

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function loadTodos() {
            if (localStorage.getItem('todos')) {
                todos = JSON.parse(localStorage.getItem('todos'));
                renderTodos();
            }
        }

        function addTodo(text) {
            const todo = {
                text,
                completed: false
            };

            todos.push(todo);
            saveTodos();
            renderTodos();
        }

        function deleteTodo(index) {
            todos.splice(index, 1);
            saveTodos();
            renderTodos();
        }

        function toggleCompleted(index) {
            todos[index].completed = !todos[index].completed;
            saveTodos();
            renderTodos();
        }

        function renderTodos() {
            const html = todos.map((todo, index) => `
                <li>
                    <input type="checkbox" ${todo.completed ? 'checked' : ''} onclick="toggleCompleted(${index})" />
                    <span${todo.completed ? ' text-decoration: line-through;' : ''}>${todo.text}</span>
                    <button onclick="deleteTodo(${index})">Supprimer</button>
                </li>`).join('');
            todosList.innerHTML = html;
        }

        loadTodos();

        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!todoInput.value.trim()) return;
            addTodo(todoInput.value);
            todoInput.value = '';
        });
    </script>
</body>

</html>
```
