 ```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        h1 {
            text-align: center;
            padding: 2rem;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            border-bottom: 1px solid #ccc;
            padding: 1rem;
            font-size: 1.2rem;
        }

        li.completed {
            text-decoration: line-through;
        }

        form {
            display: flex;
            justify-content: space-between;
        }

        input[type="text"] {
            padding: 0.5rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 4px;
            outline: none;
        }

        button {
            padding: 0.5rem 1rem;
            font-size: 1.2rem;
            background-color: #3e8e41;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo App</h1>
        <ul id="todos"></ul>
        <form id="todo-form">
            <input type="text" id="new-todo" placeholder="Add task...">
            <button onclick="addTodo()">Add</button>
        </form>
    </div>

    <script>
        const todosEl = document.getElementById('todos');
        let todos = [];

        function addTodo() {
            if (localStorage.getItem('todos')) {
                todos = JSON.parse(localStorage.getItem('todos'));
            }

            const newTodoText = document.getElementById('new-todo').value;
            if (!newTodoText.trim()) return;

            const newTodo = document.createElement('li');
            newTodo.innerHTML = `<span>${newTodoText}</span> <button onclick="toggleCompleted(this)">Complete</button> <button onclick="removeTodo(this)">Delete</button>`;
            todosEl.appendChild(newTodo);

            todos.push({ text: newTodoText, completed: false });
            saveTodos();
        }

        function toggleCompleted(todo) {
            todo.querySelector('span').classList.toggle('completed');
            const index = todos.findIndex((t) => t.text === todo.querySelector('span').innerText);
            todos[index].completed = !todos[index].completed;
            saveTodos();
        }

        function removeTodo(todo) {
            const index = todos.findIndex((t) => t.text === todo.querySelector('span').innerText);
            todos.splice(index, 1);
            todo.remove();
            saveTodos();
        }

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }
    </script>
</body>
</html>
```
