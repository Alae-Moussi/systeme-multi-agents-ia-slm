```yaml
version: '3'
services:
  frontend:
    image: nginx:light
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - node_modules:/usr/local/node_modules
  backend:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - frontend
    volumes:
      - ./backend:/app
      - node_modules_backend:/usr/local/node_modules
volumes:
  node_modules:
  node_modules_backend:
```