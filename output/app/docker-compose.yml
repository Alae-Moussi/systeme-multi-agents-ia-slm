```yaml
version: '3'
services:
  frontend:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - nginx-conf.conf:/etc/nginx/conf.d/default.conf

  backend:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - frontend
    volumes:
      - ./backend:/app

  db:
    image: mongo:latest

  db-init:
    extends:
      file: docker-entrypoint.sh
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
    depends_on:
      - db

nginx-conf.conf:
  | server {
  |   listen 80 default_server;
  |   server_name _;
  |   root /usr/share/nginx/html;
  |   index index.html index.htm;
  | }
```